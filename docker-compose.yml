# ============================================================
# AI Workspace OS - Docker Compose
# ============================================================

version: '3.9'

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: aios-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aios_db
      POSTGRES_USER: aios
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aios -d aios_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: aios-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- MinIO (文件存储) ---
  minio:
    image: minio/minio:latest
    container_name: aios-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # --- AI Workspace OS App ---
  aios-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aios-app
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      NODE_ENV: production
      PORT: 3100
      DATABASE_URL: postgresql://aios:${DB_PASSWORD:-changeme}@postgres:5432/aios_db
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      APP_URL: ${APP_URL:-https://aios.allapple.top}
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-in-production}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM: ${MAIL_FROM:-noreply@allapple.top}
      TEST_EMAIL: ${TEST_EMAIL:-test@allapple.top}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Qdrant (向量数据库) ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aios-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
