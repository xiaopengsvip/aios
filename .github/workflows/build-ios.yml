name: Build iOS

on:
  push:
    branches: [main]
    paths:
      - 'clients/ios/**'
  pull_request:
    branches: [main]
    paths:
      - 'clients/ios/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: clients/ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for simulator (compile check)
        run: |
          xcodebuild build \
            -project AiOS.xcodeproj \
            -scheme AiOS \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Build .app for device
        run: |
          xcodebuild build \
            -project AiOS.xcodeproj \
            -scheme AiOS \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Find .app
        id: find-app
        run: |
          APP_PATH=$(find build -name "AiOS.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r "${{ steps.find-app.outputs.app_path }}" Payload/
          zip -r AiOS.ipa Payload
          ls -la AiOS.ipa

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: aios-ios-ipa
          path: clients/ios/AiOS.ipa
          retention-days: 30
