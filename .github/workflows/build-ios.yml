name: Build iOS

on:
  push:
    branches: [main]
    paths:
      - 'clients/ios/**'
  pull_request:
    branches: [main]
    paths:
      - 'clients/ios/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: clients/ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build .app (no signing)
        run: |
          xcodebuild build \
            -project AiOS.xcodeproj \
            -scheme AiOS \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            | xcpretty || true

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/AiOS.app Payload/
          zip -r AiOS.ipa Payload
          rm -rf Payload

      - name: Upload .ipa
        uses: actions/upload-artifact@v4
        with:
          name: aios-ios-ipa
          path: clients/ios/AiOS.ipa
          retention-days: 30

      - name: Upload .app
        uses: actions/upload-artifact@v4
        with:
          name: aios-ios-app
          path: clients/ios/build/Build/Products/Release-iphoneos/AiOS.app
          retention-days: 30
