name: Build iOS

on:
  push:
    branches: [main]
    paths:
      - 'clients/ios/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: clients/ios

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build for simulator (compile check)
        run: |
          xcodebuild build \
            -project AiOS.xcodeproj \
            -scheme AiOS \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Build for device (unsigned)
        run: |
          xcodebuild build \
            -project AiOS.xcodeproj \
            -scheme AiOS \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      - name: Find .app
        id: find
        run: |
          APP=$(find DerivedData -name "AiOS.app" -type d | head -1)
          echo "path=$APP" >> "$GITHUB_OUTPUT"
          ls -la "$APP"

      - name: Package .ipa
        run: |
          mkdir -p Payload
          cp -r "${{ steps.find.outputs.path }}" Payload/
          zip -r -y AiOS.ipa Payload
          ls -lh AiOS.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: aios-ios
          path: clients/ios/AiOS.ipa
          retention-days: 30
