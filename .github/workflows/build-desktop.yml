name: Build Desktop (Tauri)

on:
  push:
    branches: [main]
    paths:
      - 'clients/desktop/**'
  pull_request:
    branches: [main]
    paths:
      - 'clients/desktop/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: windows
            label: Windows
          - platform: ubuntu-latest
            target: linux
            label: Linux
          - platform: macos-latest
            target: macos
            label: macOS

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: clients/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: clients/desktop/src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@latest

      - name: Build Tauri app
        run: tauri build

      - name: Upload artifacts (${{ matrix.label }})
        uses: actions/upload-artifact@v4
        with:
          name: aios-desktop-${{ matrix.target }}
          path: |
            clients/desktop/src-tauri/target/release/bundle/**/*.exe
            clients/desktop/src-tauri/target/release/bundle/**/*.msi
            clients/desktop/src-tauri/target/release/bundle/**/*.deb
            clients/desktop/src-tauri/target/release/bundle/**/*.AppImage
            clients/desktop/src-tauri/target/release/bundle/**/*.dmg
            clients/desktop/src-tauri/target/release/bundle/**/*.app
          retention-days: 90
