name: Build Desktop (Tauri)

on:
  push:
    branches: [main]
    paths:
      - 'clients/desktop/**'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: clients/desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: clients/desktop/package-lock.json

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: clients/desktop
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aios-desktop-${{ matrix.platform }}
          path: |
            clients/desktop/src-tauri/target/release/bundle/**/*.exe
            clients/desktop/src-tauri/target/release/bundle/**/*.msi
            clients/desktop/src-tauri/target/release/bundle/**/*.deb
            clients/desktop/src-tauri/target/release/bundle/**/*.AppImage
            clients/desktop/src-tauri/target/release/bundle/**/*.dmg
            clients/desktop/src-tauri/target/release/bundle/**/*.app
            clients/desktop/src-tauri/target/*/release/bundle/**/*.exe
            clients/desktop/src-tauri/target/*/release/bundle/**/*.msi
            clients/desktop/src-tauri/target/*/release/bundle/**/*.deb
            clients/desktop/src-tauri/target/*/release/bundle/**/*.AppImage
            clients/desktop/src-tauri/target/*/release/bundle/**/*.dmg
            clients/desktop/src-tauri/target/*/release/bundle/**/*.app
          retention-days: 90
